<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">

        <h1>🎬 Movie Recommendation System</h1>

        <p>
            Enter your favorite movie and get 5 similar movie recommendations.
        </p>

        <form action="/recommend" method="POST">

            <input
                type="text"
                name="movie"
                placeholder="Enter movie name (Example: Toy Story (1995))"
                required
            >

            <br><br>

            <button type="submit">
                Recommend Movies
            </button>

        </form>

    </div>

</body>
</html>
